<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ReplyAI — Tweet Reply Generator</title>
  <style>
    :root {
      --bg: #0a0a0b; --surface: #141416; --card: #1a1b1e;
      --border: #2a2b2e; --text: #e4e4e7; --text2: #a1a1aa;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308;
      --warning: #f59e0b; --radius: 12px; --font: system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 520px; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }
    
    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 10px; }
    
    /* Input */
    .input-wrap { position: relative; display: flex; gap: 8px; align-items: center; }
    .input-main {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; color: var(--text);
      font-size: 0.9rem; font-family: var(--font); outline: none; transition: 0.2s;
    }
    .input-main:focus { border-color: var(--accent); }
    .input-main::placeholder { color: var(--text2); }
    
    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px;
      border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
      font-family: var(--font); cursor: pointer; border: none; transition: 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface); }
    .btn-ghost { background: transparent; color: var(--text2); padding: 8px; }
    .btn-ghost:hover { color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }
    .btn-copy { background: var(--green); color: #000; }
    .btn-delete { background: var(--red); color: #fff; }
    
    /* Link bar */
    .link-bar {
      display: none; align-items: center; gap: 8px; margin-top: 8px;
      padding: 8px 12px; background: rgba(59,130,246,0.1); border-radius: 8px;
      border: 1px solid rgba(59,130,246,0.2);
    }
    .link-bar.show { display: flex; }
    .link-icon { font-size: 1.1rem; flex-shrink: 0; }
    .link-text { flex: 1; font-size: 0.78rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* Tone grid */
    .tone-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .tone-btn {
      padding: 8px 6px; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
      font-family: var(--font); cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text2); transition: 0.15s; text-align: center;
    }
    .tone-btn:hover { border-color: var(--accent); color: var(--text); }
    .tone-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    
    /* Preview */
    .preview-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-top: 10px;
      min-height: 60px; font-size: 0.88rem; line-height: 1.5;
      display: none; word-break: break-word; position: relative;
    }
    .preview-box.show { display: block; }
    .char-count {
      position: absolute; top: 8px; right: 10px; font-size: 0.7rem;
      font-weight: 700; padding: 2px 8px; border-radius: 10px;
    }
    .char-ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .char-warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .char-over { background: rgba(239,68,68,0.15); color: var(--red); }
    
    /* Action bar */
    .action-bar { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    .action-bar.show { display: flex; }
    
    /* Status */
    .status { font-size: 0.78rem; color: var(--text2); margin-top: 8px; text-align: center; min-height: 20px; }
    
    /* Author badge */
    .author-badge {
      display: none; align-items: center; gap: 8px; margin-bottom: 8px;
      padding: 8px 12px; background: var(--surface); border-radius: 8px;
      font-size: 0.8rem; color: var(--text2);
    }
    .author-badge.show { display: flex; }
    .author-name { font-weight: 600; color: var(--text); }
    
    /* Tweet preview */
    .tweet-preview {
      display: none; padding: 10px 12px; background: var(--surface);
      border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem;
      color: var(--text2); max-height: 100px; overflow-y: auto;
      border-left: 3px solid var(--accent);
    }
    .tweet-preview.show { display: block; }
    
    /* API Key */
    .api-row { display: flex; gap: 8px; align-items: center; }
    .api-row input { flex: 1; }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 10px 20px; font-size: 0.85rem; z-index: 1000; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    
    /* Responsive */
    @media (max-width: 400px) {
      .tone-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💬 ReplyAI</h1>
    <p>Paste link tweet → AI bikin reply pas</p>
  </div>
  
  <!-- API Key -->
  <div class="card" id="apiKeyCard">
    <div class="card-title">🔑 API Key <span id="apiKeyProvider" style="font-weight:400;color:var(--text2);font-size:0.7rem">— Agnes</span></div>
    <div class="api-row">
      <input class="input-main" id="apiKeyInput" type="password" placeholder="sk-... dari agnes-ai.com" style="font-size:0.82rem">
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">💾 Save</button>
    </div>
    <div style="font-size:0.7rem;color:var(--text2);margin-top:6px" id="apiKeyHint">Dapetin free key dari <a href="https://agnes-ai.com" target="_blank" style="color:var(--accent)">agnes-ai.com</a></div>
  </div>
  
  <!-- Language -->
  <div class="card" style="padding:10px 16px">
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:0.78rem;color:var(--text2)">🌐</span>
      <select id="langSelect" onchange="setLang(this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:0.82rem;font-family:var(--font);cursor:pointer">
        <option value="id" selected>🇮🇩 Indonesia</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>
  </div>
  
  <!-- Main Input -->
  <div class="card">
    <div class="card-title">🔗 Paste Link Tweet</div>
    <div class="input-wrap">
      <input class="input-main" id="urlInput" placeholder="https://x.com/user/status/123..." oninput="onUrlInput()">
      <!-- Auto-read: no button needed -->
    </div>
    <div class="link-bar" id="linkBar">
      <span class="link-icon">🔗</span>
      <span class="link-text" id="linkLabel"></span>
      <button class="btn btn-ghost btn-sm" onclick="clearUrl()">✕</button>
    </div>
    
    <!-- Tweet Author & Preview -->
    <div class="author-badge" id="authorBadge">
      <span>👤</span>
      <span class="author-name" id="authorName"></span>
    </div>
    <div class="tweet-preview" id="tweetPreview"></div>
    <div class="status" id="readStatus"></div>
  </div>
  
  <!-- Provider & Model -->
  <div class="card" style="padding:12px 16px">
    <div style="font-size:0.75rem;color:var(--text2);margin-bottom:8px;font-weight:600">🤖 PROVIDER AI</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="providerSelect" onchange="setProvider(this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:0.82rem;font-family:var(--font);cursor:pointer">
        <option value="agnes" selected>⚡ Agnes (Flash)</option>
        <option value="cohere">🅒 Cohere (Trial)</option>
      </select>
      <span style="font-size:0.7rem;color:var(--text2)">→ Model:</span>
      <select id="modelSelect" onchange="setModel(this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:0.82rem;font-family:var(--font);cursor:pointer">
        <option value="agnes-2.0-flash" selected>Agnes 2.0 Flash</option>
      </select>
    </div>
  </div>
  
  <!-- Tone -->
  <div class="card">
    <div class="card-title">🎭 Gaya Reply</div>
    <div class="tone-grid" id="toneGrid">
      <button class="tone-btn" data-tone="roast" onclick="setTone('roast',this)">🔥 Roasting</button>
      <button class="tone-btn" data-tone="lucu" onclick="setTone('lucu',this)">😂 Lucu</button>
      <button class="tone-btn" data-tone="informatif" onclick="setTone('informatif',this)">🤓 Informatif</button>
      <button class="tone-btn active" data-tone="kaget" onclick="setTone('kaget',this)">😱 Kaget</button>
      <button class="tone-btn" data-tone="dukung" onclick="setTone('dukung',this)">💪 Dukung</button>
      <button class="tone-btn" data-tone="skeptis" onclick="setTone('skeptis',this)">🤨 Skeptis</button>
      <button class="tone-btn" data-tone="sedih" onclick="setTone('sedih',this)">😢 Sedih</button>
      <button class="tone-btn" data-tone="marah" onclick="setTone('marah',this)">😤 Marah</button>
    </div>
  </div>
  
  <!-- Generate -->
  <button class="btn btn-primary" onclick="generateReply()" style="width:100%;justify-content:center;padding:14px;font-size:1rem" id="btnGenerate">
    ✨ Generate Reply
  </button>
  
  <!-- Preview -->
  <div class="preview-box" id="previewBox">
    <span class="char-count" id="charCount">0</span>
    <div id="previewText"></div>
  </div>
  <div class="action-bar" id="actionBar">
    <button class="btn btn-copy btn-sm" onclick="copyReply()">📋 Copy</button>
    <button class="btn btn-outline btn-sm" onclick="retry()">🔄 Retry</button>
    <button class="btn btn-delete btn-sm" onclick="deleteReply()">🗑 Hapus</button>
    <button class="btn btn-primary btn-sm" onclick="openReply()">💬 Reply di X</button>
  </div>
  
  <div class="status" id="genStatus"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let tone = 'kaget';
let lang = 'id';
let tweetContent = '';
let tweetAuthor = '';
let tweetUrl = '';
let tweetImages = [];
let hasMedia = false;
let generatedReply = '';
let isLoading = false;

function toggleManualInput() {
  var row = document.getElementById('manualInputRow');
  row.style.display = row.style.display === 'none' ? 'block' : 'none';
}

function useManualTweet() {
  var text = document.getElementById('manualTweetInput').value.trim();
  if (!text) { toast('⚠️ Isi teks tweet dulu!'); return; }
  tweetContent = text;
  tweetAuthor = '';
  tweetImages = [];
  hasMedia = false;
  document.getElementById('manualInputRow').style.display = 'none';
  document.getElementById('linkBar').classList.add('show');
  document.getElementById('linkLabel').textContent = text.slice(0,60) + '...';
  document.getElementById('readStatus').textContent = '✅ Teks tweet siap!';
  document.getElementById('readStatus').style.color = 'var(--green)';
}

// ===== INIT =====
const savedKey = localStorage.getItem('apikey_agnes');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
}

// ===== API KEY =====
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('apikey_agnes', key);
    toast('✅ API Key disimpan!');
  }
}

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem('apikey_agnes') || '';
}

// ===== URL INPUT =====
let autoReadTimer = null;
function onUrlInput() {
  const url = document.getElementById('urlInput').value.trim();
  clearTimeout(autoReadTimer);
  if (url && (url.includes('x.com') || url.includes('twitter.com'))) {
    // Auto-read after 600ms pause (debounce)
    autoReadTimer = setTimeout(() => readTweet(), 600);
  } else {
    clearUrl();
  }
}

function clearUrl() {
  document.getElementById('urlInput').value = '';
  document.getElementById('linkBar').classList.remove('show');
  document.getElementById('btnRead').style.display = 'none';
  document.getElementById('authorBadge').classList.remove('show');
  document.getElementById('tweetPreview').classList.remove('show');
  document.getElementById('readStatus').textContent = '';
  tweetContent = '';
  tweetAuthor = '';
  tweetUrl = '';
  tweetImages = [];
  hasMedia = false;
}

// ===== READ TWEET =====
async function readTweet() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  
  tweetUrl = url;
  const status = document.getElementById('readStatus');
  status.textContent = '📖 Membaca tweet...';
  status.style.color = 'var(--warning)';
  
  try {
    const res = await fetch('/.netlify/functions/fetch-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    
    if (data.ok && data.content) {
      tweetContent = data.content;
      tweetAuthor = data.author || '';
      tweetImages = data.images || [];
      hasMedia = data.hasMedia || false;
      
      document.getElementById('linkBar').classList.add('show');
      const hasImg = data.images?.length > 0;
      let preview = tweetAuthor ? `@${tweetAuthor} — ${data.content.slice(0,50)}...` : data.content.slice(0,70)+'...';
      if (hasImg) preview = '🖼️ ' + preview;
      document.getElementById('linkLabel').textContent = preview;
      
      if (tweetAuthor) {
        document.getElementById('authorBadge').classList.add('show');
        document.getElementById('authorName').textContent = `@${tweetAuthor}`;
      }
      
      document.getElementById('tweetPreview').classList.add('show');
      let previewNote = '';
      if (data.mediaTypes?.videos > 0) previewNote = '\n\n🎬 Tweet berisi video — AI baca thumbnail';
      else if (data.mediaTypes?.gifs > 0) previewNote = '\n\n🎞️ Tweet berisi GIF';
      else if (data.images?.length > 0) previewNote = `\n\n🖼️ ${data.images.length} gambar di tweet ini`;
      document.getElementById('tweetPreview').textContent = data.content + previewNote;
      
      status.textContent = '✅ Tweet berhasil dibaca!';
      status.style.color = 'var(--green)';
    } else {
      status.innerHTML = `⚠️ ${data.error || 'Gagal baca link'} <a href="#" onclick="toggleManualInput();return false;" style="color:var(--accent);text-decoration:underline">[Pakai teks manual]</a>`;
      status.style.color = 'var(--red)';
      document.getElementById('manualInputRow').style.display = 'block';
    }
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
    status.style.color = 'var(--red)';
  }
  
  // auto-read — no button
}

// ===== TONE =====
function setLang(val) { lang = val; }
function setProvider(val) {
  provider = val;
  var ms = document.getElementById('modelSelect');
  ms.innerHTML = '';
  var keyInput = document.getElementById('apiKeyInput');
  var keyHint = document.getElementById('apiKeyHint');
  var keyLabel = document.getElementById('apiKeyProvider');
  
  if (val === 'agnes') {
    ms.innerHTML = '<option value="agnes-2.0-flash">Agnes 2.0 Flash</option>';
    agnesModel = 'agnes-2.0-flash';
    keyInput.placeholder = 'sk-... dari agnes-ai.com';
    keyHint.innerHTML = 'Dapetin free key dari <a href="https://agnes-ai.com" target="_blank" style="color:var(--accent)">agnes-ai.com</a>';
    keyLabel.textContent = '— Agnes';
  } else if (val === 'cohere') {
    ms.innerHTML = '<option value="command-r7b-12-2024" selected>Command R7B (Cepat)</option><option value="command-r-08-2024">Command R (Balanced)</option><option value="command-r-plus-08-2024">Command R+ (Premium)</option><option value="command-a-03-2025">Command A (256K)</option><option value="command-a-plus-05-2026">Command A+ (Terkuat)</option>';
    cohereModel = 'command-r7b-12-2024';
    keyInput.placeholder = 'Trial key dari dashboard.cohere.com';
    keyHint.innerHTML = 'Dapetin trial key gratis dari <a href="https://dashboard.cohere.com/api-keys" target="_blank" style="color:var(--accent)">dashboard.cohere.com</a>';
    keyLabel.textContent = '— Cohere';
  }
}

function setModel(val) {
  if (provider === 'agnes') agnesModel = val;
  else cohereModel = val;
}

function setTone(t, btn) {
  tone = t;
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== GENERATE =====

function buildPromptContent(tonePrompt, langPrompt, formatInstruction) {
  let imgInfo = '';
  if (tweetImages.length > 0) {
    imgInfo = '\n\nGAMBAR DALAM TWEET:\n' + tweetImages.map((url, i) => `Gambar ${i+1}: ${url}`).join('\n');
    imgInfo += '\n\nTUGAS: Lihat gambar di atas. Reply WAJIB berdasarkan ISI GAMBAR (detail visual, teks, objek dalam gambar). Jangan cuma reply caption teks.';
  }

  return `Ini tweet yang perlu direply:

"""${tweetContent}"""${imgInfo}

${tonePrompt}
${langPrompt}
${formatInstruction}`;
}async function generateReply() {
  const key = getApiKey();
  if (!key) { toast('⚠️ Isi API Key dulu!'); return; }
  if (!tweetContent) { toast('⚠️ Baca tweet dulu — paste link & klik Baca'); return; }
  if (isLoading) return;
  isLoading = true;
  
  const btn = document.getElementById('btnGenerate');
  const status = document.getElementById('genStatus');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;
  status.textContent = '🤖 AI sedang mikir...';
  status.style.color = 'var(--text2)';
  
  const toneInstructions = {
    roast: { id: 'Kamu roasting balik tweet ini dengan PEDAS, SARKAS, tapi TETEP LUCU dan ngena. Pakai emoji marah/panas. Bikin orang ngakak sekaligus kena mental.', en: 'Roast this tweet SAVAGELY but FUNNY. Use angry/fire emojis. Make it sting but make people laugh.' },
    lucu: { id: 'Kamu bikin reply LUCU, receh, absurd, nge-goblokkin diri sendiri. Pakai emoji lucu. Orang ketawa guling-guling.', en: 'Reply with HILARIOUS humor. Use funny emojis. Silly, self-deprecating, absurd. Make people ROFL.' },
    informatif: { id: 'Kamu reply dengan FAKTA dan data yang nambahin perspektif. Pakai emoji serius/info. Informatif, netral, berbobot.', en: 'Reply with INFORMATIVE facts adding perspective. Use info emojis. Neutral, insightful.' },
    kaget: { id: 'Kamu reply dengan nada KAGET, SHOCK, gak percaya. Pakai emoji kaget/shock. Bikin orang ikut tercengang.', en: 'Reply sounding SHOCKED and stunned. Use shock emojis. Make others feel the disbelief.' },
    dukung: { id: 'Kamu reply dengan DUKUNGAN penuh, semangat, positive vibes. Pakai emoji semangat/heart. Bikin tweet author merasa diapresiasi.', en: 'Reply with SUPPORTIVE energy. Use heart/spirit emojis. Positive vibes, make the author feel appreciated.' },
    skeptis: { id: 'Kamu reply dengan SKEPTIS, nanya balik, challenge asumsi. Pakai emoji skeptis. Kritis tapi respectful.', en: 'Reply SKEPTICALLY. Use skeptical emojis. Question assumptions, be critical but respectful.' },
    sedih: { id: 'Kamu reply dengan nada SEDIH, melow, empati mendalam. Pakai emoji sedih. Bikin orang ikut terharu.', en: 'Reply with SAD, emotional tone. Use sad emojis. Deep empathy.' },
    marah: { id: 'Kamu reply dengan MARAH, geregetan, righteous anger. Pakai emoji marah. Pedas tapi justified.', en: 'Reply with ANGRY tone. Use angry emojis. Righteous fury, biting but justified.' }
  };
  
  const toneGuide = toneInstructions[tone] || toneInstructions['kaget'];
  const tonePrompt = lang === 'id' ? toneGuide.id : toneGuide.en;
  const langPrompt = lang === 'id' 
    ? 'Bahasa Indonesia natural dan engaging.'
    : 'Natural, engaging English.';
  const formatInstruction = lang === 'id'
    ? 'WAJIB: tepat 2 paragraf dipisahkan 1 baris kosong. Tiap paragraf max 150 karakter. Total reply DI BAWAH 300 karakter. Sisipkan 1-2 emoji emosional di tiap paragraf. NO hashtag. NO prefix. Output HANYA teks reply.'
    : 'MUST: exactly 2 paragraphs separated by 1 blank line. Each paragraph max 150 chars. Total reply UNDER 300 chars. Include 1-2 emotional emojis per paragraph. NO hashtags. NO prefix. Output ONLY the reply text.';
  
  // Debug
    console.log('🔧 Provider:', provider, '| Model:', provider === 'agnes' ? agnesModel : cohereModel);
    console.log('🔧 tonePrompt:', tonePrompt.slice(0,80));
    console.log('🔧 langPrompt:', langPrompt);
    console.log('🔧 formatInstruction:', formatInstruction.slice(0,80));
    
  try {
    const promptContent = buildPromptContent(tonePrompt, langPrompt, formatInstruction);
    var endpoint, reqBody;
    
    if (provider === 'agnes') {
      endpoint = 'https://apihub.agnes-ai.com/v1/chat/completions';
      reqBody = { model: agnesModel, messages: [{ role: 'user', content: promptContent }], max_tokens: 120, temperature: 0.9 };
    } else {
      endpoint = 'https://api.cohere.com/v2/chat';
      reqBody = { model: cohereModel, messages: [{ role: 'user', content: promptContent }], max_tokens: 120, temperature: 0.9 };
    }
    
    var res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key}, body: JSON.stringify(reqBody) });
    var data = await res.json();
    
    generatedReply = '';
    if (data.choices && data.choices[0] && data.choices[0].message) generatedReply = data.choices[0].message.content;
    else if (data.message && data.message.content) {
      var c = data.message.content;
      if (Array.isArray(c) && c[0] && c[0].text) generatedReply = c[0].text;
      else if (typeof c === 'string') generatedReply = c;
    }
    
    if (!generatedReply) {
      var err = data.error ? (data.error.message || JSON.stringify(data.error)) : (JSON.stringify(data).slice(0,150));
      generatedReply = 'Gagal generate: ' + err;
    }
    
    // Show preview
    var previewBox = document.getElementById('previewBox');
    var previewText = document.getElementById('previewText');
    var charCount = document.getElementById('charCount');
    var actionBar = document.getElementById('actionBar');
    
    previewBox.classList.add('show');
    previewText.textContent = generatedReply;
    
    var chars = generatedReply.length;
    charCount.textContent = chars;
    charCount.className = 'char-count';
    if (chars <= 270) charCount.classList.add('char-ok');
    else if (chars <= 300) charCount.classList.add('char-warn');
    else charCount.classList.add('char-over');
    
    actionBar.classList.add('show');
    status.textContent = '✅ ' + chars + ' karakter — ' + (chars <= 300 ? 'Pas buat X!' : 'Kelebihan!');
    status.style.color = chars <= 280 ? 'var(--green)' : 'var(--warning)';
    
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
    status.style.color = 'var(--red)';
  }
  
  btn.textContent = '✨ Generate Reply';
  btn.disabled = false;
isLoading = false;
}

// ===== ACTIONS =====
function copyReply() {
  if (!generatedReply) return;
  navigator.clipboard.writeText(generatedReply);
  toast('📋 Disalin!');
}

function retry() {
  generateReply();
}

function deleteReply() {
  generatedReply = '';
  document.getElementById('previewBox').classList.remove('show');
  document.getElementById('actionBar').classList.remove('show');
  document.getElementById('genStatus').textContent = '';
}

function openReply() {
  if (!tweetUrl) return;
  // Open X intent to reply
  const replyUrl = tweetUrl.replace(/\/x\.com\//, '/x.com/').replace(/\/twitter\.com\//, '/twitter.com/');
  window.open(replyUrl, '_blank');
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== ENTER KEY =====
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateReply();
  }
});

console.log('💬 ReplyAI ready');
</script>
