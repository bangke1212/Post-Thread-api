<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ReplyAI — Tweet Reply Generator</title>
  <style>
    :root {
      --bg: #0a0a0b; --surface: #141416; --card: #1a1b1e;
      --border: #2a2b2e; --text: #e4e4e7; --text2: #a1a1aa;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308;
      --warning: #f59e0b; --radius: 12px; --font: system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; justify-content: center;
      padding: 16px;
    }
    .container { width: 100%; max-width: 520px; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }
    
    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 10px; }
    
    /* Input */
    .input-wrap { position: relative; display: flex; gap: 8px; align-items: center; }
    .input-main {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; color: var(--text);
      font-size: 0.9rem; font-family: var(--font); outline: none; transition: 0.2s;
    }
    .input-main:focus { border-color: var(--accent); }
    .input-main::placeholder { color: var(--text2); }
    
    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px;
      border-radius: var(--radius); font-size: 0.85rem; font-weight: 600;
      font-family: var(--font); cursor: pointer; border: none; transition: 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface); }
    .btn-ghost { background: transparent; color: var(--text2); padding: 8px; }
    .btn-ghost:hover { color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }
    .btn-copy { background: var(--green); color: #000; }
    .btn-delete { background: var(--red); color: #fff; }
    
    /* Link bar */
    .link-bar {
      display: none; align-items: center; gap: 8px; margin-top: 8px;
      padding: 8px 12px; background: rgba(59,130,246,0.1); border-radius: 8px;
      border: 1px solid rgba(59,130,246,0.2);
    }
    .link-bar.show { display: flex; }
    .link-icon { font-size: 1.1rem; flex-shrink: 0; }
    .link-text { flex: 1; font-size: 0.78rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* Tone grid */
    .tone-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .tone-btn {
      padding: 8px 6px; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
      font-family: var(--font); cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text2); transition: 0.15s; text-align: center;
    }
    .tone-btn:hover { border-color: var(--accent); color: var(--text); }
    .tone-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    
    /* Preview */
    .preview-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-top: 10px;
      min-height: 60px; font-size: 0.88rem; line-height: 1.5;
      display: none; word-break: break-word; position: relative;
    }
    .preview-box.show { display: block; }
    .char-count {
      position: absolute; top: 8px; right: 10px; font-size: 0.7rem;
      font-weight: 700; padding: 2px 8px; border-radius: 10px;
    }
    .char-ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .char-warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .char-over { background: rgba(239,68,68,0.15); color: var(--red); }
    
    /* Action bar */
    .action-bar { display: none; gap: 8px; margin-top: 8px; justify-content: flex-end; }
    .action-bar.show { display: flex; }
    
    /* Status */
    .status { font-size: 0.78rem; color: var(--text2); margin-top: 8px; text-align: center; min-height: 20px; }
    
    /* Author badge */
    .author-badge {
      display: none; align-items: center; gap: 8px; margin-bottom: 8px;
      padding: 8px 12px; background: var(--surface); border-radius: 8px;
      font-size: 0.8rem; color: var(--text2);
    }
    .author-badge.show { display: flex; }
    .author-name { font-weight: 600; color: var(--text); }
    
    /* Tweet preview */
    .tweet-preview {
      display: none; padding: 10px 12px; background: var(--surface);
      border-radius: 8px; margin-bottom: 8px; font-size: 0.8rem;
      color: var(--text2); max-height: 100px; overflow-y: auto;
      border-left: 3px solid var(--accent);
    }
    .tweet-preview.show { display: block; }
    
    /* API Key */
    .api-row { display: flex; gap: 8px; align-items: center; }
    .api-row input { flex: 1; }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 10px 20px; font-size: 0.85rem; z-index: 1000; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    
    /* Responsive */
    @media (max-width: 400px) {
      .tone-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>💬 ReplyAI</h1>
    <p>Paste link tweet → AI bikin reply pas</p>
  </div>
  
  <!-- API Key -->
  <div class="card">
    <div class="card-title">🔑 API Key</div>
    <div class="api-row">
      <input class="input-main" id="apiKeyInput" type="password" placeholder="sk-... dari agnes-ai.com" style="font-size:0.82rem">
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">💾 Save</button>
    </div>
    <div style="font-size:0.7rem;color:var(--text2);margin-top:6px">Dapetin free key dari <a href="https://agnes-ai.com" target="_blank" style="color:var(--accent)">agnes-ai.com</a></div>
  </div>
  
  <!-- Language -->
  <div class="card" style="padding:10px 16px">
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:0.78rem;color:var(--text2)">🌐</span>
      <select id="langSelect" onchange="lang=this.value" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:0.82rem;font-family:var(--font);cursor:pointer">
        <option value="id" selected>🇮🇩 Indonesia</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>
  </div>
  
  <!-- Main Input -->
  <div class="card">
    <div class="card-title">🔗 Paste Link Tweet</div>
    <div class="input-wrap">
      <input class="input-main" id="urlInput" placeholder="https://x.com/user/status/123..." oninput="onUrlInput()">
      <!-- Auto-read: no button needed -->
    </div>
    <div class="link-bar" id="linkBar">
      <span class="link-icon">🔗</span>
      <span class="link-text" id="linkLabel"></span>
      <button class="btn btn-ghost btn-sm" onclick="clearUrl()">✕</button>
    </div>
    
    <!-- Tweet Author & Preview -->
    <div class="author-badge" id="authorBadge">
      <span>👤</span>
      <span class="author-name" id="authorName"></span>
    </div>
    <div class="tweet-preview" id="tweetPreview"></div>
    <div class="status" id="readStatus"></div>
  </div>
  
  <!-- Tone -->
  <div class="card">
    <div class="card-title">🎭 Gaya Reply</div>
    <div class="tone-grid" id="toneGrid">
      <button class="tone-btn" data-tone="roast" onclick="setTone('roast',this)">🔥 Roasting</button>
      <button class="tone-btn" data-tone="lucu" onclick="setTone('lucu',this)">😂 Lucu</button>
      <button class="tone-btn" data-tone="informatif" onclick="setTone('informatif',this)">🤓 Informatif</button>
      <button class="tone-btn active" data-tone="kaget" onclick="setTone('kaget',this)">😱 Kaget</button>
      <button class="tone-btn" data-tone="dukung" onclick="setTone('dukung',this)">💪 Dukung</button>
      <button class="tone-btn" data-tone="skeptis" onclick="setTone('skeptis',this)">🤨 Skeptis</button>
      <button class="tone-btn" data-tone="sedih" onclick="setTone('sedih',this)">😢 Sedih</button>
      <button class="tone-btn" data-tone="marah" onclick="setTone('marah',this)">😤 Marah</button>
    </div>
  </div>
  
  <!-- Generate -->
  <button class="btn btn-primary" onclick="generateReply()" style="width:100%;justify-content:center;padding:14px;font-size:1rem" id="btnGenerate">
    ✨ Generate Reply
  </button>
  
  <!-- Preview -->
  <div class="preview-box" id="previewBox">
    <span class="char-count" id="charCount">0</span>
    <div id="previewText"></div>
  </div>
  <div class="action-bar" id="actionBar">
    <button class="btn btn-copy btn-sm" onclick="copyReply()">📋 Copy</button>
    <button class="btn btn-outline btn-sm" onclick="retry()">🔄 Retry</button>
    <button class="btn btn-delete btn-sm" onclick="deleteReply()">🗑 Hapus</button>
    <button class="btn btn-primary btn-sm" onclick="openReply()">💬 Reply di X</button>
  </div>
  
  <div class="status" id="genStatus"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let tone = 'kaget';
let lang = 'id';
let tweetContent = '';
let tweetAuthor = '';
let tweetUrl = '';
let tweetImages = [];
let hasMedia = false;
let generatedReply = '';
let isLoading = false;

// ===== INIT =====
const savedKey = localStorage.getItem('apikey_agnes');
if (savedKey) {
  document.getElementById('apiKeyInput').value = savedKey;
}

// ===== API KEY =====
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('apikey_agnes', key);
    toast('✅ API Key disimpan!');
  }
}

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem('apikey_agnes') || '';
}

// ===== URL INPUT =====
let autoReadTimer = null;
function onUrlInput() {
  const url = document.getElementById('urlInput').value.trim();
  clearTimeout(autoReadTimer);
  if (url && (url.includes('x.com') || url.includes('twitter.com'))) {
    // Auto-read after 600ms pause (debounce)
    autoReadTimer = setTimeout(() => readTweet(), 600);
  } else {
    clearUrl();
  }
}

function clearUrl() {
  document.getElementById('urlInput').value = '';
  document.getElementById('linkBar').classList.remove('show');
  document.getElementById('btnRead').style.display = 'none';
  document.getElementById('authorBadge').classList.remove('show');
  document.getElementById('tweetPreview').classList.remove('show');
  document.getElementById('readStatus').textContent = '';
  tweetContent = '';
  tweetAuthor = '';
  tweetUrl = '';
  tweetImages = [];
  hasMedia = false;
}

// ===== READ TWEET =====
async function readTweet() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  
  tweetUrl = url;
  const status = document.getElementById('readStatus');
  status.textContent = '📖 Membaca tweet...';
  status.style.color = 'var(--warning)';
  
  try {
    const res = await fetch('/.netlify/functions/fetch-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    
    if (data.ok && data.content) {
      tweetContent = data.content;
      tweetAuthor = data.author || '';
      tweetImages = data.images || [];
      hasMedia = data.hasMedia || false;
      
      document.getElementById('linkBar').classList.add('show');
      const hasImg = data.images?.length > 0;
      let preview = tweetAuthor ? `@${tweetAuthor} — ${data.content.slice(0,50)}...` : data.content.slice(0,70)+'...';
      if (hasImg) preview = '🖼️ ' + preview;
      document.getElementById('linkLabel').textContent = preview;
      
      if (tweetAuthor) {
        document.getElementById('authorBadge').classList.add('show');
        document.getElementById('authorName').textContent = `@${tweetAuthor}`;
      }
      
      document.getElementById('tweetPreview').classList.add('show');
      document.getElementById('tweetPreview').textContent = data.content + (data.images?.length ? `\n\n🖼️ ${data.images.length} gambar di tweet ini` : '');
      
      status.textContent = '✅ Tweet berhasil dibaca!';
      status.style.color = 'var(--green)';
    } else {
      status.textContent = '⚠️ Gagal membaca tweet: ' + (data.error || 'Unknown');
      status.style.color = 'var(--red)';
    }
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
    status.style.color = 'var(--red)';
  }
  
  // auto-read — no button
}

// ===== TONE =====
function setTone(t, btn) {
  tone = t;
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ===== GENERATE =====

function buildPromptContent(tonePrompt, langPrompt, formatInstruction) {
  let imgInfo = '';
  if (tweetImages.length > 0) {
    imgInfo = '\n\nGAMBAR DALAM TWEET:\n' + tweetImages.map((url, i) => `Gambar ${i+1}: ${url}`).join('\n');
    imgInfo += '\n\nTUGAS: Lihat gambar di atas. Reply WAJIB berdasarkan ISI GAMBAR (detail visual, teks, objek dalam gambar). Jangan cuma reply caption teks.';
  }

  return `Ini tweet yang perlu direply:

"""${tweetContent}"""${imgInfo}

${tonePrompt}
${langPrompt}
${formatInstruction}`;
}async function generateReply() {
  const key = getApiKey();
  if (!key) { toast('⚠️ Isi API Key dulu!'); return; }
  if (!tweetContent) { toast('⚠️ Baca tweet dulu — paste link & klik Baca'); return; }
  if (isLoading) return;
  isLoading = true;
  
  const btn = document.getElementById('btnGenerate');
  const status = document.getElementById('genStatus');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;
  status.textContent = '🤖 AI sedang mikir...';
  status.style.color = 'var(--text2)';
  
  const toneInstructions = {
    roast: { id: 'Kamu roasting balik tweet ini dengan PEDAS, SARKAS, tapi TETEP LUCU dan ngena. Bikin orang ngakak sekaligus kena mental. Maks 280 karakter.', en: 'Roast this tweet SAVAGELY but FUNNY. Make it sting but make people laugh. Max 280 chars.' },
    lucu: { id: 'Kamu bikin reply LUCU, receh, absurd, nge-goblokkin diri sendiri. Orang ketawa guling-guling. Maks 280 karakter.', en: 'Reply with HILARIOUS humor. Silly, self-deprecating, absurd. Make people ROFL. Max 280 chars.' },
    informatif: { id: 'Kamu reply dengan FAKTA dan data yang nambahin perspektif. Informatif, netral, berbobot. Maks 280 karakter.', en: 'Reply with INFORMATIVE facts adding perspective. Neutral, insightful. Max 280 chars.' },
    kaget: { id: 'Kamu reply dengan nada KAGET, SHOCK, gak percaya. Bikin orang ikut tercengang. Maks 280 karakter.', en: 'Reply sounding SHOCKED and stunned. Make others feel the disbelief. Max 280 chars.' },
    dukung: { id: 'Kamu reply dengan DUKUNGAN penuh, semangat, positive vibes. Bikin tweet author merasa diapresiasi. Maks 280 karakter.', en: 'Reply with SUPPORTIVE energy. Positive vibes, make the author feel appreciated. Max 280 chars.' },
    skeptis: { id: 'Kamu reply dengan SKEPTIS, nanya balik, challenge asumsi. Kritis tapi respectful. Maks 280 karakter.', en: 'Reply SKEPTICALLY. Question assumptions, be critical but respectful. Max 280 chars.' },
    sedih: { id: 'Kamu reply dengan nada SEDIH, melow, empati mendalam. Bikin orang ikut terharu. Maks 280 karakter.', en: 'Reply with SAD, emotional tone. Deep empathy. Max 280 chars.' },
    marah: { id: 'Kamu reply dengan MARAH, geregetan, righteous anger. Pedas tapi justified. Maks 280 karakter.', en: 'Reply with ANGRY tone. Righteous fury, biting but justified. Max 280 chars.' }
  };
  
  const toneGuide = toneInstructions[tone] || toneInstructions['kaget'];
  const tonePrompt = lang === 'id' ? toneGuide.id : toneGuide.en;
  const langPrompt = lang === 'id' 
    ? 'Bahasa Indonesia natural dan engaging.'
    : 'Natural, engaging English.';
  
  try {
    const res = await fetch('https://apihub.agnes-ai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [{
          role: 'user',
          content: `Ini tweet yang perlu direply:

"""${tweetContent}"""

${tonePrompt}
${langPrompt}
WAJIB: tepat 2 paragraf dipisahkan 1 baris kosong. Tiap paragraf MAKS 135 karakter. Total MAKS 275 karakter. JIKA ADA GAMBAR: reply berdasarkan isi gambar, sebut detail dari gambar. NO hashtag. NO prefix. Output HANYA teks reply jadi.`
        }],
        max_tokens: 200,
        temperature: 0.9
      })
    });
    
    const data = await res.json();
    generatedReply = data.choices?.[0]?.message?.content || 'Gagal generate.';
    
    // Show preview
    const previewBox = document.getElementById('previewBox');
    const previewText = document.getElementById('previewText');
    const charCount = document.getElementById('charCount');
    const actionBar = document.getElementById('actionBar');
    
    previewBox.classList.add('show');
    previewText.textContent = generatedReply;
    
    const chars = generatedReply.length;
    charCount.textContent = chars;
    charCount.className = 'char-count';
    if (chars <= 250) charCount.classList.add('char-ok');
    else if (chars <= 280) charCount.classList.add('char-warn');
    else charCount.classList.add('char-over');
    
    actionBar.classList.add('show');
    status.textContent = `✅ ${chars} karakter — ` + (chars <= 280 ? 'Pas buat X!' : 'Agak panjang');
    status.style.color = chars <= 280 ? 'var(--green)' : 'var(--warning)';
    
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
    status.style.color = 'var(--red)';
  }
  
  btn.textContent = '✨ Generate Reply';
  btn.disabled = false;
  isLoading = false;
}

// ===== ACTIONS =====
function copyReply() {
  if (!generatedReply) return;
  navigator.clipboard.writeText(generatedReply);
  toast('📋 Disalin!');
}

function retry() {
  generateReply();
}

function deleteReply() {
  generatedReply = '';
  document.getElementById('previewBox').classList.remove('show');
  document.getElementById('actionBar').classList.remove('show');
  document.getElementById('genStatus').textContent = '';
}

function openReply() {
  if (!tweetUrl) return;
  // Open X intent to reply
  const replyUrl = tweetUrl.replace(/\/x\.com\//, '/x.com/').replace(/\/twitter\.com\//, '/twitter.com/');
  window.open(replyUrl, '_blank');
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== ENTER KEY =====
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateReply();
  }
});

console.log('💬 ReplyAI ready');
</script>
</body>
</html>
